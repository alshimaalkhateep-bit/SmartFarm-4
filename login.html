<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>تسجيل الدخول | من أرضنا</title>

    <link rel="stylesheet"
        href="style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
         <style>
            body{
                 background-color: #064E3B;
                }

            
        </style>
</head>

<body>


    <!-- الخلفية الزراعية -->

    <div class="background">


        <!-- عناصر زخرفية -->

        <div class="plant plant-one">🌿</div>

        <div class="plant plant-two">🌱</div>

        <div class="plant plant-three">🍃</div>


        <!-- بطاقة تسجيل الدخول -->

        <main class="login-card">


            <!-- الشعار -->

            <div class="logo">


                <div class="logo-icon">

                    🌱

                </div>


                <h1>

                    من أرضنا

                </h1>


                <p>

                    زراعة ذكية .. مستقبل مستدام

                </p>


            </div>


            <!-- عنوان الصفحة -->

            <div class="welcome-text">


                <h2>

                    مرحباً بعودتك 👋

                </h2>


                <p>

                    سجل دخولك للوصول إلى حسابك

                </p>


            </div>


            <!-- نموذج تسجيل الدخول -->

            <form id="loginForm">


                <!-- البريد أو الهاتف -->

                <div class="input-group">


                    <label>

                        البريد الإلكتروني أو رقم الهاتف

                    </label>


                    <div class="input-box">


                        <i class="fa-solid fa-user"></i>


                        <input type="text"

                            id="email"

                            placeholder="أدخل البريد أو رقم الهاتف">


                    </div>


                    <small id="emailError"></small>


                </div>


                <!-- كلمة المرور -->

                <div class="input-group">


                    <label>

                        كلمة المرور

                    </label>


                    <div class="input-box">


                        <i class="fa-solid fa-lock"></i>


                        <input type="password"

                            id="password"

                            placeholder="أدخل كلمة المرور">


                        <button type="button"

                            class="show-password"

                            id="home.html">


                            <i class="fa-solid fa-eye"></i>


                        </button>


                    </div>


                    <small id="passwordError"></small>


                </div>


                <!-- تذكرني -->

                <div class="options">


                    <label class="remember">


                        <input type="checkbox">


                        <span>

                            تذكرني

                        </span>


                    </label>


                    <a href="#">

                        نسيت كلمة المرور؟

                    </a>


                </div>


                <!-- زر الدخول -->

                <button type="submit"

                    class="login-btn">


                    تسجيل الدخول


                    <i class="fa-solid fa-arrow-left"></i>


                </button>


            </form>


            <!-- فاصل -->

            <div class="divider">


                <span>

                    أو

                </span>


            </div>


            <!-- إنشاء حساب -->

            <div class="register">


                <p>

                    ليس لديك حساب؟

                </p>


                <a href="register.html">

                    إنشاء حساب جديد

                </a>


            </div>


        </main>


        <!-- نص أسفل الشاشة -->

        <footer>

            🌱 نزرع اليوم لمستقبل أفضل

        </footer>


    </div>


    <script src="script.js"></script>

</body>

</html>
